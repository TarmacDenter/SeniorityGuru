name: Reset dev to main

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  reset:
    name: Reset dev → main
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.FORCE_PUSH_TOKEN }}

      - run: git push origin main:dev --force
