name: Sync dev to main

on:
  workflow_dispatch:

jobs:
  sync:
    name: Reset dev to main
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - run: git push --force origin origin/main:refs/heads/dev
